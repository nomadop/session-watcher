<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Session Watcher</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --bg:#0f1115; --fg:#e6e6e6; --dim:#8a8f98; --green:#3fb950; --red:#f85149; --blue:#58a6ff; --orange:#e3b341; }
  body { background:var(--bg); color:var(--fg); font:14px/1.5 ui-monospace,Menlo,monospace; margin:0; padding:16px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px 16px; margin-bottom:12px; }
  .dim { color:var(--dim); } .estimated { color:var(--dim); font-style:italic; }
  .bar { height:14px; background:#21262d; border-radius:7px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--blue); }
  #statusbar.restart { background:var(--red); color:#fff; }
  #statusbar { padding:10px 16px; border-radius:8px; background:#12261a; color:var(--green); font-weight:bold; }
  .row { display:flex; gap:18px; flex-wrap:wrap; } .row > div { white-space:nowrap; }
  canvas { max-height:240px; }
</style>
</head>
<body>
  <!-- Step 3b: lastStopEvent banner. FIRST child of <body>, a sticky overlay that reserves NO layout
       space when `hidden` (so it never overlaps the chart / pushes the console out of view). With no OS
       popup, this is the dashboard's only surface for a stop_hook-grade alert (wall/gate/empty_burn). -->
  <div id="stop-banner" hidden style="position:sticky;top:0;z-index:9999;background:var(--red);color:#fff;font-weight:bold;padding:10px 16px;border-radius:8px;margin-bottom:12px;"></div>
  <div class="card"><b>Session Watcher</b> <span id="dot">●</span> <span class="dim" id="project"></span></div>
  <div class="card">
    <div id="lline">L: — / L*: —</div>
    <div class="bar"><i id="lbar" style="width:0%"></i></div>
    <div id="eta" class="dim"></div>
  </div>
  <div class="card"><canvas id="decisionChart"></canvas>
    <div class="row">
      <label>平滑度:
        <select id="smooth"><option value="10">灵敏</option><option value="20" selected>均衡</option><option value="40">平滑</option></select>
      </label></div>
  </div>
  <div class="card"><canvas id="paybackChart"></canvas></div>
  <div class="card row" id="stats"></div>
  <div id="statusbar">— continue —</div>
  <div class="card dim" id="regret"></div>

<script type="module">
import { computeYMax, buildMissMarkers, deepWaterDisplay } from './chart-helpers.js';
const k = n => n == null ? '—' : (Math.abs(n) >= 1000 ? (n/1000).toFixed(0)+'k' : Math.round(n));
let decisionChart, paybackChart;
let lastHist = [];
// R5-1: display-only sticky deep-water latch, held in the tab's VOLATILE module scope. A browser refresh
// resets it to false — if the user reloads while L_read sits in the deadband (just below L_exit), the lamp
// momentarily drops out of deep-water until the next real re-entry. This is INTENTIONAL for a display-only
// feature: do NOT persist it to localStorage or push it to the server (that re-introduces the cross-turn /
// cross-process display state R5-1 deliberately avoids; the routing-level latch is deferred to RV-C10).
let deepWaterDisplayLatched = false;

function initCharts() {
  decisionChart = new Chart(document.getElementById('decisionChart'), {
    type: 'line',
    // ER-2 (Task 10): the 外推 (kFit extrapolation) dataset[2] and the 辅助 L* (LstarFit) dataset[3] are
    // retired — burnRate/hBreak own the projection role now (§17.3), so the chart plots only L, the capped
    // decision line (Lthreshold), and the cache-miss markers. The miss dataset moved [4]→[2] accordingly.
    data: { datasets: [
      { label:'L', borderColor:'#58a6ff', data:[], pointRadius:0 },
      { label:'L* (阈值)', borderColor:'#f85149', data:[], pointRadius:0 },
      { label:'缓存 miss', borderColor:'#f85149', borderWidth:1, data:[], pointRadius:0,
        showLine:true, spanGaps:false, fill:false },
    ]},
    options: { animation:false, parsing:false, scales:{ x:{type:'linear'}, y:{beginAtZero:false} },
      plugins: { tooltip: { callbacks: { afterBody: (items) => {
        const item = items[0];
        if (!item) return '';
        // Every remaining decision-chart dataset IS history-aligned: the miss-marker points carry an
        // explicit historyIndex (their own dataIndex is the marker-array position, not a hist row);
        // L / Lthreshold points map 1:1 to hist by dataIndex. All KEEP their per-point
        // cacheRead/cacheCreation breakdown. (ER-2/Task 10 removed the 外推 dataset that alone needed the
        // historyAligned:false opt-out — no dataset is history-UNaligned any more.)
        const raw = item.raw;
        const hi = Number.isInteger(raw?.historyIndex) ? raw.historyIndex : item.dataIndex;
        const p = lastHist[hi];
        if (!p) return '';
        // ER-5: server already resolved effectiveL into p.L; client must not re-derive the miss rule.
        const eL = p.L;
        return [ `L(有效): ${eL}`, `cacheRead: ${p.cacheRead}`, `cacheCreation: ${p.cacheCreation}`,
                 p.miss ? '⚠ 缓存 miss（stock 已重建）' : '' ].filter(Boolean);
      } } } } }
  });
  paybackChart = new Chart(document.getElementById('paybackChart'), {
    type: 'line',
    data: { datasets: [
      { label:'回本P (Σg/Lbase)', borderColor:'#3fb950', data:[], pointRadius:0, yAxisID:'y' },
      { label:'φ 成本倍率', borderColor:'#e3b341', data:[], pointRadius:0, yAxisID:'y1' },
      { label:'甜点 P=1+ρ (φ2×)', borderColor:'#8a8f98', borderDash:[2,4], data:[], pointRadius:0, yAxisID:'y' },
    ]},
    options: { animation:false, parsing:false, scales:{ x:{type:'linear'},
      y:{position:'left'}, y1:{position:'right', grid:{drawOnChartArea:false}} } }
  });
}

async function refresh() {
  let s, hist;
  const fw = document.getElementById('smooth').value; // smoothing → fitWindow passed to API
  try {
    s = await (await fetch('/api/status?fitWindow=' + fw)).json();
    hist = await (await fetch('/api/history?fitWindow=' + fw)).json();
  } catch { return; }
  lastHist = hist;
  // #6-frontend: ONE calibrating flag drives lline/lbar/statusbar so the three can never disagree.
  // metricsReliable can be TRUE during warmup (kAvg=0 → Lthreshold≈baseline.total → pct≈100%), so we
  // must also branch on calibratingReason — mirrors the server statusline (server.js formatLine).
  const calibrating = s.calibratingReason != null;
  const note = calibrating ? ' <span class="estimated">(指标校准中)</span>' : '';
  document.getElementById('lline').innerHTML =
    `L: ${k(s.L)} / L*: ${calibrating ? '<span class="estimated">校准中</span>' : k(s.Lstar)}${note}`;
  // Don't render a misleading ~100% fill while calibrating — collapse the bar to 0%.
  const pct = calibrating ? 0 : (s.Lthreshold > 0 ? Math.min(100, Math.round(s.L/s.Lthreshold*100)) : 0);
  document.getElementById('lbar').style.width = pct + '%';
  // ER-2 (Task 10): the eta card (`预计 ~N 轮后撞线` / `已过线` / `外推: —`) is retired with the kFit chain
  // (§17.3 — never surface rounds-remaining on a plateau). The break-even from burnRate/hBreak (statusline)
  // owns that role. Show only whether we're calibrating.
  document.getElementById('eta').textContent = calibrating ? '指标校准中' : '';

  const pts = (arr, key) => arr.map((p, i) => ({ x: i, y: p[key] }));
  decisionChart.data.datasets[0].data = pts(hist, 'L');
  // #9-plot: decision line is the CAPPED Lthreshold (min(Lstar,Lcap)) so it matches the restart
  // signal in the context-cap regime. (ER-2/Task 10 retired the 外推 extrapolation + 辅助 L* datasets;
  // the uncapped per-point Lstar curve is intentionally no longer plotted.)
  decisionChart.data.datasets[1].data = pts(hist, 'Lthreshold');
  const yMax = computeYMax(hist);
  decisionChart.data.datasets[2].data = buildMissMarkers(hist, yMax); // ER-2: miss markers moved [4]→[2]
  decisionChart.update();

  paybackChart.data.datasets[0].data = pts(hist, 'paybackP').map(p => ({x:p.x, y:p.y*100}));
  paybackChart.data.datasets[1].data = pts(hist, 'phi');
  // sweet-spot horizontal line at P = sweetP (φ=2×), drawn as a flat dataset across the x-range
  const xmax = Math.max(1, hist.length - 1);
  paybackChart.data.datasets[2].data = s.sweetP != null
    ? [{x:0, y:s.sweetP*100}, {x:xmax, y:s.sweetP*100}] : [];
  paybackChart.update();

  document.getElementById('stats').innerHTML =
    `<div>kAvg: ${k(s.kAvg)}</div><div>g: ${k(s.growth)}</div><div>seg: ${s.segment}</div><div>Lbase: ${k(s.baseline?.total)}</div>` +
    `<div>ρ: ${s.rho?.toFixed(2)}</div><div>时机权重 ${Math.round((s.timingWeight||0)*100)}%</div>` +
    `<div>calls: ${s.apiCalls}</div><div>uptime: ${Math.floor((s.uptime||0)/60)}m</div>`;

  // #6-frontend: calibrating-first ordering. restart is false whenever calibratingReason != null
  // (watcher.js: restart = crossed && reason===null), so the 🔴 branch never fires while calibrating;
  // guarding it on !calibrating is belt-and-suspenders and keeps the three widgets consistent.
  const sb = document.getElementById('statusbar');
  if (s.restart && !calibrating) { sb.classList.add('restart'); sb.textContent = `🔴 L≥L* 建议重启 (${s.restartReason})`; }
  else if (calibrating) {
    sb.classList.remove('restart');
    sb.textContent = s.calibratingReason === 'no_transcript' ? '无转录/未找到，指标校准中' : '指标校准中，暂不给硬信号';
  }
  else { sb.classList.remove('restart'); sb.textContent = '— continue —'; }

  document.getElementById('regret').textContent = !calibrating && s.regret != null
    ? `当前节奏比成本最优多花约 ${Math.round(s.regret*100)}%` : '';

  // Step 3b: lastStopEvent banner — mirror formatLine's STRICT priority + TTL. The stop_hook alert wins
  // the turn when its turnSeq === currentTurnSeq; else the banner is hidden (the bill pulse is a
  // statusline-only concern — the banner is stop_hook-grade only, consistent with recordStopEvent).
  const rl = s.rateLamp || {};
  const stop = rl.lastStopEvent, cur = rl.currentTurnSeq;
  const banner = document.getElementById('stop-banner');
  if (stop && stop.turnSeq === cur) { banner.textContent = stop.message; banner.hidden = false; }
  else { banner.hidden = true; banner.textContent = ''; }   // TTL: clears next turn / when none

  // R5-1 (display-only): update the sticky deep-water latch off the reliable instant bundle. DISPLAY ONLY —
  // it drives lamp/banner styling, never settleBatchAtBoundary (routing keeps the instantaneous inDeepWater).
  if (rl.reliable) {
    deepWaterDisplayLatched = deepWaterDisplay(deepWaterDisplayLatched, {
      L_read: rl.L_read, L_exit_fullCarry: rl.L_exit_fullCarry, cRatio: rl.C_RATIO, B_rebuild: rl.B_rebuild });
  } else {
    deepWaterDisplayLatched = false; // unreliable frame → no deep-water claim
  }
}

let pollTimer = null;
function startPolling() { if (!pollTimer) pollTimer = setInterval(refresh, 2000); } // guard: only one interval
function connect() {
  try {
    const es = new EventSource('/api/stream');
    es.onmessage = e => { try { if (JSON.parse(e.data).type === 'scan') refresh(); } catch {} };
    es.onerror = () => { es.close(); startPolling(); }; // degrade to polling, no duplicate intervals
  } catch { startPolling(); }
}

initCharts();
window.__SW_decisionChart = decisionChart; // e2e/debug handle only (see test/e2e/dashboard.spec.js)
document.getElementById('smooth').addEventListener('change', refresh); // smoothing selector now drives fitWindow
refresh(); connect();
</script>
</body>
</html>
