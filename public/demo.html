<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Session Watcher — Demo</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes/base.css" />
<link id="sw-theme-css" rel="stylesheet" href="themes/h.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div style="position:fixed;top:0;left:0;right:0;z-index:10000;
              background:var(--sw-bg-panel,#151b20);border-bottom:1px solid var(--sw-border,#232d35);
              padding:6px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;
              color:var(--sw-text-secondary,#8b8f96);display:flex;align-items:center;gap:24px;
              flex-wrap:wrap;justify-content:center">
    <span>Anonymized static replay · 20× · no data upload</span>
    <a href="./" style="color:var(--mint,#4fe0b0);text-decoration:none">← Project</a>
    <a href="https://github.com/nomadop/session-watcher" style="color:var(--mint,#4fe0b0);text-decoration:none">GitHub</a>
  </div>
  <div class="sw-wrap">
    <div id="sw-chrome"></div>
    <div id="sw-hero"></div>
    <div class="sw-lower">
      <div id="sw-history"></div>
      <div id="sw-buckets"></div>
    </div>
    <div id="sw-terms"></div>
  </div>
  <script type="module" src="./demo-app.js"></script>
</body>
</html>
